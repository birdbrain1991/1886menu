<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Sulphur 1886 — Select</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#020a04}

/* ── VHS BACKGROUND ── */
body{
  display:flex;align-items:center;justify-content:center;
  font-family:"Share Tech Mono",monospace;
}

/* ── CRT SCANLINES ── */
#scanlines{
  position:fixed;inset:0;pointer-events:none;z-index:50;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 2px,
    rgba(0,0,0,0.13) 2px,rgba(0,0,0,0.13) 4px);
}

/* ── VHS NOISE CANVAS ── */
#noise{position:fixed;inset:0;z-index:40;pointer-events:none;opacity:0.045;}

/* ── GLITCH OVERLAY ── */
#glitch-overlay{
  position:fixed;inset:0;z-index:45;pointer-events:none;
  background:transparent;
}

/* ── STATUS BAR ── */
#status{
  position:fixed;top:0;left:0;right:0;z-index:60;
  padding:8px 20px;font-size:10px;letter-spacing:3px;
  color:rgba(176,192,32,0.35);
  display:flex;justify-content:space-between;
  pointer-events:none;
}

/* ── BACK ── */
#back{
  position:fixed;top:18px;left:22px;z-index:60;
  font-size:10px;letter-spacing:4px;color:rgba(176,192,32,0.45);
  text-decoration:none;transition:color 0.3s;
}
#back:hover{color:#b0c020}

/* ── MAIN STAGE ── */
#stage{
  position:relative;
  width:min(420px,92vw);
  height:100vh;
  display:flex;align-items:center;justify-content:center;
}

/* ── FIGURE WRAP ── */
#fig-wrap{
  position:relative;
  width:387px;
  height:630px;
  transform:scale(min(1, calc(90vh / 630px)));
  transform-origin:center center;
}

/* ── ANATOMY IMAGE ── */
#anatomy{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:contain;
  /* gold-green vault tint via CSS filter */
  filter:
    sepia(1)
    saturate(2.8)
    hue-rotate(42deg)
    brightness(0.7)
    contrast(1.2);
  opacity:0.88;
}

/* ── GOLD-GREEN TINT LAYER ── */
#tint{
  position:absolute;inset:0;
  background:linear-gradient(
    160deg,
    rgba(80,120,10,0.22) 0%,
    rgba(30,60,5,0.35) 40%,
    rgba(100,150,20,0.18) 100%
  );
  mix-blend-mode:color;
  pointer-events:none;
}

/* ── HOTSPOT BUTTONS ── */
.hotspot{
  position:absolute;
  display:flex;align-items:center;
  cursor:pointer;
  z-index:10;
}
.hotspot-dot{
  width:10px;height:10px;border-radius:50%;
  background:#b0c020;
  box-shadow:0 0 0 3px rgba(176,192,32,0.25),0 0 16px rgba(176,192,32,0.6);
  animation:dotpulse 2s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes dotpulse{
  0%,100%{box-shadow:0 0 0 3px rgba(176,192,32,0.25),0 0 16px rgba(176,192,32,0.5);}
  50%{box-shadow:0 0 0 6px rgba(176,192,32,0.12),0 0 28px rgba(176,192,32,0.8);}
}
.hotspot-line{
  width:60px;height:1px;
  background:linear-gradient(90deg,rgba(176,192,32,0.8),rgba(176,192,32,0.1));
}
.hotspot.left .hotspot-line{
  background:linear-gradient(270deg,rgba(176,192,32,0.8),rgba(176,192,32,0.1));
}
.hotspot-label{
  font-family:"Orbitron",monospace;
  font-size:11px;letter-spacing:3px;font-weight:700;
  color:#b0c020;
  text-shadow:0 0 12px rgba(176,192,32,0.7);
  white-space:nowrap;
  padding:0 10px;
  transition:text-shadow 0.3s,letter-spacing 0.3s;
}
.hotspot:hover .hotspot-label{
  text-shadow:0 0 20px rgba(176,192,32,1),0 0 40px rgba(176,192,32,0.5);
  letter-spacing:5px;
}
.hotspot:hover .hotspot-dot{
  background:#e0ff40;
}

/* ── COMING SOON label style ── */
.hotspot.inactive{cursor:default;opacity:0.45;}
.hotspot.inactive:hover .hotspot-label{letter-spacing:3px;text-shadow:0 0 12px rgba(176,192,32,0.7);}
.hotspot.inactive:hover .hotspot-dot{background:#b0c020;}
.coming-soon{
  font-size:8px;letter-spacing:2px;
  color:rgba(176,192,32,0.5);
  display:block;margin-top:2px;
}

/* ── GLITCH text anim ── */
@keyframes glitch1{
  0%,94%,100%{clip-path:inset(0 0 100% 0);transform:translate(0)}
  95%{clip-path:inset(20% 0 60% 0);transform:translate(-4px,1px)}
  97%{clip-path:inset(60% 0 20% 0);transform:translate(3px,-1px)}
  99%{clip-path:inset(40% 0 40% 0);transform:translate(-2px,0)}
}

#loader{
  position:fixed;inset:0;background:#020a04;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 0.8s ease;
}
#loader.hidden{opacity:0;pointer-events:none;}
.loader-text{
  font-family:monospace;font-size:11px;letter-spacing:5px;
  color:rgba(176,192,32,0.6);animation:lpulse 1.4s ease-in-out infinite;
}
.loader-bar{
  width:160px;height:1px;background:rgba(176,192,32,0.15);
  margin-top:18px;position:relative;overflow:hidden;
}
.loader-bar::after{
  content:'';position:absolute;left:-60%;top:0;
  width:60%;height:100%;background:#b0c020;
  animation:lslide 1.2s ease-in-out infinite;
}
@keyframes lpulse{0%,100%{opacity:0.6}50%{opacity:1}}
@keyframes lslide{0%{left:-60%}100%{left:110%}}


#melt-canvas{
  position:fixed;inset:0;z-index:200;
  pointer-events:none;
  display:none;
}

.hotspot-dot::after{
  content:'';
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:10px;height:10px;
  border-radius:50%;
  background:rgba(255,30,0,0);
  box-shadow:0 0 0 0 rgba(255,60,10,0.9);
  animation:redpulse 2s ease-out infinite;
}
@keyframes redpulse{
  0%  {box-shadow:0 0 0 0 rgba(255,60,10,0.9);}
  70% {box-shadow:0 0 0 24px rgba(255,60,10,0);}
  100%{box-shadow:0 0 0 0 rgba(255,60,10,0);}
}
.hotspot-dot{
  position:relative;
}
</style>
</head>

<script>
'use strict';

// ── TIMESTAMP ──
function tick(){
  const d=new Date();
  document.getElementById('ts').textContent=
    d.toLocaleTimeString('de-DE',{hour12:false});
}
tick(); setInterval(tick,1000);

// ── VHS NOISE ──
const noiseCanvas=document.getElementById('noise');
const nCtx=noiseCanvas.getContext('2d');
function resizeNoise(){
  noiseCanvas.width=window.innerWidth;
  noiseCanvas.height=window.innerHeight;
}
resizeNoise();
window.addEventListener('resize',resizeNoise);

function renderNoise(){
  const w=noiseCanvas.width,h=noiseCanvas.height;
  const img=nCtx.createImageData(w,h);
  const d=img.data;
  for(let i=0;i<d.length;i+=4){
    const v=Math.random()*255|0;
    d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;
  }
  nCtx.putImageData(img,0,0);
}

// ── VHS HORIZONTAL GLITCH LINES ──
const glitchEl=document.getElementById('glitch-overlay');
let glitchTimer=null;

function doGlitch(){
  // Random horizontal tear
  const strips=Math.floor(Math.random()*3)+1;
  let css='';
  for(let i=0;i<strips;i++){
    const y=Math.random()*100;
    const h=Math.random()*3+0.5;
    const tx=(Math.random()-0.5)*18;
    const op=Math.random()*0.18+0.06;
    css+=`
    <div style="
      position:absolute;
      left:0;right:0;
      top:${y}%;height:${h}%;
      background:rgba(176,192,32,${op});
      transform:translateX(${tx}px);
      pointer-events:none;
    "></div>`;
  }
  // Occasional full-frame flash
  if(Math.random()<0.08){
    css+=`<div style="position:absolute;inset:0;background:rgba(176,192,32,0.04);pointer-events:none;"></div>`;
  }
  glitchEl.innerHTML=css;
  setTimeout(()=>{glitchEl.innerHTML='';}, Math.random()*120+40);

  // Schedule next glitch
  glitchTimer=setTimeout(doGlitch, Math.random()*3500+800);
}
doGlitch();

// Noise loop — slower to save CPU
let noiseFrame=0;
function noiseLoop(){
  noiseFrame++;
  if(noiseFrame%3===0) renderNoise();
  requestAnimationFrame(noiseLoop);
}
noiseLoop();

// ── NAVIGATION ──
let navigating=false;
function goTo(target){
  if(navigating) return;
  navigating=true;
  // Show fish2 image first, then melt it
  anatomy1.style.opacity = '0';
  anatomy2.style.opacity = '1';
  anatomy2.style.transform = 'translate(0,0)';
  setTimeout(()=>{
    meltOut(()=>{
      if(target==='characters'){
        window.location.href='https://birdbrain1991.github.io/gallery1886/';
      }
    });
  }, 350);
}

// ── MELT / LIQUIFY TRANSITION ──
function meltOut(cb){
  const mc = document.getElementById('melt-canvas');
  mc.width  = window.innerWidth;
  mc.height = window.innerHeight;
  mc.style.display = 'block';
  const ctx = mc.getContext('2d');

  // Grab the fig-wrap position to know where to draw
  const wrap = document.getElementById('fig-wrap');
  const rect = wrap.getBoundingClientRect();

  // Draw anatomy2 image onto melt canvas at its position
  const img = document.getElementById('anatomy2');

  const dur = 1400;
  const start = performance.now();

  function step(now){
    const p = Math.min((now - start) / dur, 1);
    ctx.clearRect(0, 0, mc.width, mc.height);

    const iw = rect.width, ih = rect.height;
    const ix = rect.left, iy = rect.top;
    const slices = 48;
    const sliceH = ih / slices;

    for(let s = 0; s < slices; s++){
      const sy = s / slices; // 0..1 from top
      // Melt starts from top, flows down — lower slices melt first
      const meltStart = sy * 0.5;
      const localP = Math.max(0, Math.min(1, (p - meltStart) / 0.65));

      // Horizontal wave + downward sag
      const wave = Math.sin(sy * Math.PI * 5 + p * 8) * localP * iw * 0.06;
      const sag  = localP * localP * ih * 1.8 * sy;
      const stretchH = sliceH * (1 + localP * sy * 2.5);

      // Fade out as it drips
      const alpha = Math.max(0, 1 - localP * localP * 1.2);
      ctx.globalAlpha = alpha;

      ctx.drawImage(
        img,
        0,          s * (img.naturalHeight / slices),
        img.naturalWidth, img.naturalHeight / slices,
        ix + wave,  iy + s * sliceH + sag,
        iw,         stretchH
      );
    }
    ctx.globalAlpha = 1;

    if(p < 1){
      requestAnimationFrame(step);
    } else {
      setTimeout(cb, 100);
    }
  }
  requestAnimationFrame(step);
}

// ── IMAGE GLITCH between two fish images ──
const anatomy1 = document.getElementById('anatomy');
const anatomy2 = document.getElementById('anatomy2');
let glitchImg = false;
function imageGlitch(){
  // Random short glitch swap
  const dur = 400 + Math.random()*300;
  glitchImg = !glitchImg;
  anatomy1.style.opacity = glitchImg ? '0' : '1';
  anatomy2.style.opacity = glitchImg ? '1' : '0';
  // Offset position slightly during glitch
  const dx = (Math.random()-0.5)*12;
  const dy = (Math.random()-0.5)*8;
  if(glitchImg){
    anatomy2.style.transform = `translate(${dx}px,${dy}px)`;
  }
  setTimeout(()=>{
    anatomy1.style.opacity = '1';
    anatomy2.style.opacity = '0';
    anatomy2.style.transform = 'translate(0,0)';
    glitchImg = false;
    // Schedule next glitch
    setTimeout(imageGlitch, 3000 + Math.random()*4000);
  }, dur);
}
// Start first image glitch after 2s
setTimeout(imageGlitch, 2000);

// Scale figure to viewport height
function scaleFig(){
  const wrap=document.getElementById('fig-wrap');
  const vh=window.innerHeight;
  const scale=Math.min(1,(vh*0.88)/630);
  wrap.style.transform=`scale(${scale})`;
}
scaleFig();
window.addEventListener('resize',scaleFig);

// ── LOADER ──
function hideLoader(){
  const l=document.getElementById('loader');
  if(!l) return;
  l.classList.add('hidden');
  setTimeout(()=>{ if(l.parentNode) l.parentNode.removeChild(l); },900);
}
window.addEventListener('pageshow',()=>{
  document.fonts.ready.then(()=>{
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      hideLoader();
    }));
  });
});
</script>
